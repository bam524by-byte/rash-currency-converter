<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
</head>
<body>

<h1>🔐 Change Password</h1>

<form method="POST">

    <input
        type="password"
        name="old_password"
        placeholder="Old Password"
        required
    >

    <br><br>

    <input
        type="password"
        name="new_password"
        placeholder="New Password"
        required
    >

    <br><br>

    <button type="submit">
        Update Password
    </button>

</form>

</body>
</html>
