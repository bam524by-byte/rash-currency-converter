<!DOCTYPE html>
<html lang="en">
<head><link rel="manifest"
href="{{ url_for('static', filename='manifest.json') }}">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rash Currency Converter</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <div id="splash">

<h1>
💱 Rash Currency Converter
</h1>

</div>
    <div class="navbar">
        <div class="language-box">

<select>

<option>English</option>

<option>French</option>

<option>Arabic</option>

<option>Swahili</option>

</select>

</div>

<div class="logo">
💱 Rash Converter
</div>

<div class="nav-links">

<a href="/">Home</a>

<a href="/dashboard">
Dashboard
</a>

<a href="#contact">
    <div class="ai-box">

<h3>🤖 Rash AI Assistant</h3>

<p>
AI financial assistant coming soon...
</p>

<button class="convert-btn">
Ask AI
</button>

</div>
Contact
</a>

</div>

</div>

<div class="particles"></div>

<div class="theme-toggle">

<button onclick="toggleTheme()">
🌙
</button>

</div>

<div class="container">

<div class="card">

<div class="top-bar">

<h1>💱 Rash Currency Converter</h1>

<div id="clock"></div>

</div>

<p class="subtitle">
    <div class="auth-box">

<form action="/register" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<form action="/login" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
<a href="/dashboard">

<button class="convert-btn">
Open Dashboard
</button>

</a>
</button>

</form>

</div>
Premium Forex & Crypto Converter
</p>

<input
type="text"
id="searchBox"
placeholder="Search Currency..."
class="search-box">

<div class="input-group">

<input
type="number"
id="amount"
placeholder="Enter Amount">

</div>

<div class="currency-box">

<div class="select-box">

<span id="fromFlag">🇺🇸</span>

<select id="fromCurrency">

{% for currency in currencies %}

<option value="{{ currency }}">
{{ currency }}
</option>

{% endfor %}

</select>

</div>

<button class="swap-btn"
onclick="swapCurrencies()">
⇄
</button>

<div class="select-box">

<span id="toFlag">🇺🇬</span>

<select id="toCurrency">

{% for currency in currencies %}

<option value="{{ currency }}">
{{ currency }}
</option>

{% endfor %}

</select>

</div>

</div>

<button class="convert-btn"
onclick="convertCurrency()">

Convert Now

</button>

<button class="download-btn"
onclick="downloadReceipt()">

Download Receipt

</button>

<div class="loader"
id="loader"></div>

<div class="result">

<h2 id="result">
Result: --
</h2>

<p id="rateText"></p>

</div>

<div class="chart-box">

<iframe
src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_chart&symbol=FX:EURUSD&interval=D&hidesidetoolbar=1&theme=dark"
width="100%"
height="300"
frameborder="0">
</iframe>

</div>

<div class="history">

<h3>Recent Conversions</h3>

<ul id="historyList"></ul>

</div>
<div class="contact-box" id="contact">

<h3>📧 Contact Support</h3>

<form action="/contact" method="POST">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<textarea
name="message"
placeholder="Your Message"
required></textarea>

<button type="submit">
Send Message
</button>

</form>

</div>
<div id="toast">
Conversion Successful
</div>

<audio id="sound"
src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
